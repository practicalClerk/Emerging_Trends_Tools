apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-cicd-predictor-ingress
  labels:
    app: ml-cicd-predictor
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
  - host: ml-cicd.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ml-cicd-predictor
            port:
              number: 80
  - host: api.ml-cicd.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ml-cicd-predictor
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ml-cicd-predictor-ingress-metrics
  labels:
    app: ml-cicd-predictor
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: metrics.ml-cicd.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ml-cicd-predictor
            port:
              number: 5000
