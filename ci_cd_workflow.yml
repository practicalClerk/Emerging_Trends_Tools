name: CI/CD Pipeline with ML Failure Prediction

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ml-cicd-predictor

jobs:
  # ========== JOB 1: Extract Commit Metadata ==========
  extract-metadata:
    runs-on: ubuntu-latest
    outputs:
      commit_size: ${{ steps.metadata.outputs.commit_size }}
      files_changed: ${{ steps.metadata.outputs.files_changed }}
      commit_hash: ${{ steps.metadata.outputs.commit_hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract commit metadata
        id: metadata
        run: |
          # Get commit info
          COMMIT_HASH=$(git rev-parse HEAD | cut -c1-8)
          COMMIT_SIZE=$(git show --stat | grep -E '^\s+[0-9]+\s+files?' | awk '{sum=0; for(i=4;i<NF;i++) if($i ~ /^[0-9]+\+/) sum+=$(i); print sum}' || echo "50")
          FILES_CHANGED=$(git diff HEAD~ --name-only | wc -l || echo "3")
          
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "commit_size=$COMMIT_SIZE" >> $GITHUB_OUTPUT
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT
          
          echo "📊 Commit Metadata:"
          echo "   Hash: $COMMIT_HASH"
          echo "   Size: $COMMIT_SIZE lines"
          echo "   Files changed: $FILES_CHANGED"

  # ========== JOB 2: ML Prediction Gate ==========
  ml-prediction-gate:
    needs: extract-metadata
    runs-on: ubuntu-latest

    # Optional: Use cloud API if prediction endpoint is configured
    env:
      PREDICTION_API_URL: ${{ secrets.PREDICTION_API_URL }}
    outputs:
      prediction: ${{ steps.predict.outputs.prediction }}
      risk_level: ${{ steps.predict.outputs.risk_level }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Call Cloud Prediction API (optional)
        id: cloud-predict
        if: env.PREDICTION_API_URL != ''
        run: |
          response=$(curl -s -X POST "${{ secrets.PREDICTION_API_URL }}/predict" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.PREDICTION_API_KEY }}" \
            -d '{
              "commit_size": ${{ needs.extract-metadata.outputs.commit_size }},
              "files_changed": ${{ needs.extract-metadata.outputs.files_changed }},
              "test_coverage": 82.5,
              "past_failures": 1,
              "dependency_changes": 0,
              "author_experience": 100,
              "time_of_commit": 14,
              "build_time": 320.0
            }')

          echo "Cloud API response: $response"
          prediction=$(echo "$response" | jq -r '.prediction')
          risk_level=$(echo "$response" | jq -r '.risk_level')

          echo "prediction=$prediction" >> $GITHUB_OUTPUT
          echo "risk_level=$risk_level" >> $GITHUB_OUTPUT

      - name: Run ML Prediction
        if: steps.cloud-predict.outputs.prediction == ''
        id: predict
        run: |
          python << 'EOF'
          import joblib
          import pandas as pd
          import json
          
          # Load model and preprocessing objects
          model = joblib.load('random_forest_model.pkl')
          scaler = joblib.load('scaler.pkl')
          label_encoder = joblib.load('label_encoder.pkl')
          with open('feature_names.txt', 'r') as f:
              feature_names = f.read().strip().split(',')
          
          # Create sample input (in real scenario, extract from actual commit)
          input_data = {
              'commit_size': int(${{ needs.extract-metadata.outputs.commit_size }}),
              'files_changed': int(${{ needs.extract-metadata.outputs.files_changed }}),
              'test_coverage': 82.5,  # Would come from test results
              'past_failures': 1,      # Would come from commit history
              'dependency_changes': 0, # Would come from requirements changes
              'author_experience': 100, # Would come from author history
              'time_of_commit': 14,    # Hour of commit
              'build_time': 320.0      # Previous build time average
          }
          
          # Prepare features
          X = pd.DataFrame([input_data], columns=feature_names)
          X_scaled = scaler.transform(X)
          
          # Predict
          prediction = model.predict(X_scaled)[0]
          probability = model.predict_proba(X_scaled)[0]
          
          # Format output
          prediction_label = "FAIL" if prediction == 1 else "PASS"
          failure_prob = probability[1]
          
          if failure_prob < 0.25:
              risk_level = "LOW"
          elif failure_prob < 0.50:
              risk_level = "MEDIUM"
          elif failure_prob < 0.75:
              risk_level = "HIGH"
          else:
              risk_level = "CRITICAL"
          
          print(f"🤖 ML Prediction: {prediction_label}")
          print(f"📊 Failure Probability: {failure_prob:.2%}")
          print(f"⚠️  Risk Level: {risk_level}")
          
          # Set outputs
          with open('prediction.json', 'w') as f:
              json.dump({
                  'prediction': prediction_label,
                  'risk_level': risk_level,
                  'failure_probability': round(failure_prob, 4)
              }, f)
          
          EOF
          
          # Export outputs
          PREDICTION=$(python -c "import json; d=json.load(open('prediction.json')); print(d['prediction'])")
          RISK_LEVEL=$(python -c "import json; d=json.load(open('prediction.json')); print(d['risk_level'])")
          
          echo "prediction=$PREDICTION" >> $GITHUB_OUTPUT
          echo "risk_level=$RISK_LEVEL" >> $GITHUB_OUTPUT

      - name: Decision Gate
        run: |
          PREDICTION="${{ steps.cloud-predict.outputs.prediction || steps.predict.outputs.prediction }}"
          RISK_LEVEL="${{ steps.cloud-predict.outputs.risk_level || steps.predict.outputs.risk_level }}"
          
          echo "🔮 ML Pipeline Decision Gate"
          echo "Prediction: $PREDICTION"
          echo "Risk Level: $RISK_LEVEL"
          
          if [ "$PREDICTION" = "FAIL" ]; then
              echo ""
              echo "🔴 HIGH FAILURE RISK DETECTED - STOPPING PIPELINE"
              echo "   Recommendation: Review commit before merging"
              exit 1
          else
              echo ""
              echo "🟢 LOW FAILURE RISK - PROCEEDING WITH BUILD"
              exit 0
          fi

  # ========== JOB 3: Build & Test (Only if ML gate passes) ==========
  build-and-test:
    needs: ml-prediction-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v || true

      - name: Build Docker image
        run: |
          docker build -t ml-cicd-predictor:latest .
          echo "✅ Docker image built successfully"

  # ========== JOB 4: Push to Registry (Optional) ==========
  push-to-registry:
    needs: [build-and-test, ml-prediction-gate]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
